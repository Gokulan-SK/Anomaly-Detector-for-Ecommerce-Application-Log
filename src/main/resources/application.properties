# =============================================
# Anomaly Detection Service - Application Config
# =============================================

# Server
server.port=8082

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:anomalydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for dev/debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# spring.jpa.database-platform is intentionally omitted — Hibernate 6 auto-detects H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.indent-output=true
